<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アポロ整骨院 | 草加市新善町【完全個室・プライベート空間】</title>

    <link rel="stylesheet" href="theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <img src="images/logo.png" alt="アポロ整骨院">
            </h1>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-image">
                <img src="images/main_visual.jpg" alt="清潔感のある完全個室">
            </div>
            <div class="hero-content">
                <p class="catchphrase">4月午前空きあります☆</p>
                <h2>【完全個室】 【プライベート空間】 【リラックス】<br>60分3,600円〜</h2>
            </div>
        </section>

        <section class="menu container">
            <h3 class="section-title">主要メニュー</h3>
            <div class="menu-grid">
                <div class="menu-item">
                    <span class="menu-name">全身マッサージ 60分</span>
                    <span class="menu-price">¥3,600</span>
                </div>
                <div class="menu-item">
                    <span class="menu-name">全身マッサージ 90分</span>
                    <span class="menu-price">¥5,400</span>
                </div>
                <div class="menu-item">
                    <span class="menu-name">クイックマッサージ 30分</span>
                    <span class="menu-price">¥2,200</span>
                </div>
                <div class="menu-item">
                    <span class="menu-name">足つぼマッサージ 60分</span>
                    <span class="menu-price">¥4,400</span>
                </div>
            </div>
        </section>

        <section class="info container">
            <h3 class="section-title">基本情報</h3>
            <div class="info-content">
                <dl>
                    <dt>住所</dt>
                    <dd>埼玉県草加市新善町513-10</dd>
                    
                    <dt>アクセス</dt>
                    <dd>新田駅から徒歩12分、バス停角屋橋バス停目の前</dd>
                    
                    <dt>営業時間</dt>
                    <dd>平日 9:00〜20:00（最終受付18:30）</dd>
                    
                    <dt>定休日</dt>
                    <dd>土曜・日曜・祝日</dd>
                </dl>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 アポロ整骨院. All rights reserved.</p>
    </footer>

    <!-- スマホ用追従バー -->
    <div class="sticky-bar">
        <a href="tel:000-0000-0000" class="btn-phone"><span>電話予約</span></a>
        <a href="https://line.me/R/ti/p/@yourid" class="btn-line"><span>LINE予約</span></a>
    </div>

    <!-- GPU加速のためのレイヤー強制 -->
    <div class="gpu-layer"></div>

</html>
