<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面｜アポロ整骨院</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body { background: #f9f9f9; font-family: sans-serif; }
        .admin-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { height: 150px; resize: vertical; }
        .save-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        .save-btn:hover { background: #e68a00; }
        #status-msg { margin-top: 20px; text-align: center; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #777; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="text-align: center; color: #ff9800; margin-bottom: 30px;">お知らせ管理画面</h1>
        
        <div class="form-group">
            <label>管理パスワード</label>
            <input type="password" id="password" placeholder="パスワードを入力">
        </div>
        
        <div class="form-group">
            <label>お知らせメッセージ内容</label>
            <textarea id="message" placeholder="トップページに表示するメッセージを入力してください"></textarea>
        </div>
        
        <button class="save-btn" onclick="saveMessage()">内容を更新する</button>
        
        <div id="status-msg"></div>
        
        <a href="/" class="back-link">← サイトトップへ戻る</a>
    </div>

    <script>
        // 初期値の読み込み
        fetch('/api/message')
            .then(res => res.json())
            .then(data => {
                if (data.message) {
                    document.getElementById('message').value = data.message;
                }
            })
            .catch(err => console.error('Error loading message:', err));

        async function saveMessage() {
            const password = document.getElementById('password').value;
            const message = document.getElementById('message').value;
            const status = document.getElementById('status-msg');
            
            if (!password) {
                status.style.color = 'red';
                status.textContent = 'パスワードを入力してください';
                return;
            }

            status.style.color = '#333';
            status.textContent = '更新中...';

            try {
                const res = await fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, message })
                });
                
                const result = await res.json();
                if (res.ok) {
                    status.style.color = 'green';
                    status.textContent = '更新が完了しました！';
                    document.getElementById('password').value = '';
                } else {
                    status.style.color = 'red';
                    status.textContent = result.error || '更新に失敗しました';
                }
            } catch (err) {
                status.style.color = 'red';
                status.textContent = '通信エラーが発生しました';
            }
        }
    </script>
</body>
</html>
