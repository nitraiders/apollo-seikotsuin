<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面｜アポロ整骨院</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body { background: #f9f9f9; font-family: sans-serif; }
        .admin-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { height: 150px; resize: vertical; }
        .save-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        .save-btn:hover { background: #e68a00; }
        #status-msg { margin-top: 20px; text-align: center; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #777; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="text-align: center; color: #ff9800; margin-bottom: 30px;">お知らせ管理画面</h1>
        
        <div class="form-group">
            <label>管理パスワード</label>
            <input type="password" id="password" placeholder="パスワードを入力">
        </div>
        
        <div class="form-group">
            <label>お知らせメッセージ内容</label>
            <textarea id="message" placeholder="トップページに表示するメッセージを入力してください"></textarea>
        </div>
        
        <button class="save-btn" onclick="saveMessage()">内容を更新する</button>
        
        <hr style="margin: 40px 0; border: none; border-top: 1px solid #eee;">
        <h2 style="text-align: center; color: #ff9800; margin-bottom: 20px;">口コミ管理</h2>
        <div id="reviews-admin-list">
            <p style="text-align: center; color: #777;">読み込み中...</p>
        </div>
        
        <a href="/" class="back-link">← サイトトップへ戻る</a>
    </div>

    <style>
        .admin-review-item { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 4px; background: #fafafa; }
        .admin-review-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
        .admin-review-content { margin-bottom: 10px; font-size: 14px; }
        .reply-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .reply-input { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 5px; }
        .btn-group { display: flex; gap: 10px; }
        .btn-reply { background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-delete { background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    </style>

    <script>
        // 初期値の読み込み (お知らせ)
        fetch('/api/message')
            .then(res => res.json())
            .then(data => {
                if (data.message) {
                    document.getElementById('message').value = data.message;
                }
            })
            .catch(err => console.error('Error loading message:', err));

        // 口コミ一覧の読み込み
        async function loadAdminReviews() {
            const list = document.getElementById('reviews-admin-list');
            try {
                const res = await fetch('/api/reviews');
                const reviews = await res.json();
                
                if (reviews.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #999;">口コミはありません。</p>';
                    return;
                }

                list.innerHTML = reviews.map(r => `
                    <div class="admin-review-item">
                        <div class="admin-review-meta">${r.date} | ${r.nickname}さん (${r.profile}) | ${'★'.repeat(r.stars)}</div>
                        <div class="admin-review-content">${r.comment}</div>
                        <div class="reply-area">
                            <label style="font-size: 12px;">オーナー返信:</label>
                            <textarea id="reply-${r.id}" class="reply-input" placeholder="返信を入力">${r.reply || ''}</textarea>
                            <div class="btn-group">
                                <button class="btn-reply" onclick="handleAction('${r.id}', 'reply')">返信を保存</button>
                                <button class="btn-delete" onclick="handleAction('${r.id}', 'delete')">削除</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<p style="color: red; text-align: center;">読み込みエラー</p>';
            }
        }

        async function handleAction(id, action) {
            const password = document.getElementById('password').value;
            if (!password) {
                alert('パスワードを入力してください');
                return;
            }

            let data = { id, action, password };
            if (action === 'reply') {
                data.reply = document.getElementById(`reply-${id}`).value;
            }

            if (action === 'delete' && !confirm('本当に削除しますか？')) return;

            try {
                const res = await fetch('/api/reviews', {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': password
                    },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert(action === 'reply' ? '返信を保存しました' : '削除しました');
                    loadAdminReviews();
                } else {
                    alert('認証エラーまたは処理に失敗しました');
                }
            } catch (err) {
                alert('通信エラー');
            }
        }

        async function saveMessage() {
            const password = document.getElementById('password').value;
            const message = document.getElementById('message').value;
            const status = document.getElementById('status-msg');
            
            if (!password) {
                status.style.color = 'red';
                status.textContent = 'パスワードを入力してください';
                return;
            }

            status.style.color = '#333';
            status.textContent = '更新中...';

            try {
                const res = await fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, message })
                });
                
                const result = await res.json();
                if (res.ok) {
                    status.style.color = 'green';
                    status.textContent = '更新が完了しました！';
                } else {
                    status.style.color = 'red';
                    status.textContent = result.error || '更新に失敗しました';
                }
            } catch (err) {
                status.style.color = 'red';
                status.textContent = '通信エラーが発生しました';
            }
        }

        loadAdminReviews();
    </script>
</body>
</html>
