<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口コミ｜アポロ整骨院 公式サイト</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="g-header">
        <div class="inner">
            <img src="images/logo.png" alt="アポロ整骨院" class="site-logo" loading="lazy">
        </div>
    </header>

    <div class="main-wrap">
        <header class="salon-header">
            <div class="salon-info-left">
                <div class="catchphrase">草加市・新田駅徒歩12分｜完全個室のプライベートサロン</div>
                <h1 class="salon-name">アポロ整骨院</h1>
            </div>
            <div class="salon-actions">
                <a href="https://lin.ee/6cYRjnW" class="btn-reserve-brand">LINEで予約</a>
                <a href="https://tol-app.jp/s/apollo" class="btn-reserve-net">ネット予約（24h）</a>
            </div>
        </header>

        <nav>
            <ul class="tabs-nav">
                <li class=""><a href="index.html">ホーム</a></li>
                <li class=""><a href="menu.html">メニュー</a></li>
                <li class=""><a href="staff.html">スタッフ</a></li>
                <li class=""><a href="map.html">地図</a></li>
                <li class="active"><a href="review.html">口コミ</a></li>
            </ul>
        </nav>

        
        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 class="section-title" style="margin-bottom: 0;">お客様からの口コミ</h2>
                <button id="openModal" class="btn-reserve-brand" style="font-size: 14px; padding: 8px 15px; margin-bottom: 0;">口コミを投稿する</button>
            </div>
            
            <div id="reviews-container">
                <p style="text-align: center; padding: 20px;">読み込み中...</p>
            </div>
        </section>
    </div>

    <!-- Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>口コミ投稿</h2>
                <span class="close">&times;</span>
            </div>
            <form id="reviewForm">
                <div class="form-group">
                    <label>ニックネーム</label>
                    <input type="text" name="nickname" required placeholder="例：ちひろ">
                </div>
                <div class="form-group">
                    <label>プロフィール</label>
                    <div style="display: flex; gap: 5px;">
                        <select name="gender" required>
                            <option value="">性別</option>
                            <option value="女性">女性</option>
                            <option value="男性">男性</option>
                            <option value="回答しない">回答しない</option>
                        </select>
                        <select name="age" required>
                            <option value="">年代</option>
                            <option value="10代">10代</option>
                            <option value="20代">20代</option>
                            <option value="30代">30代</option>
                            <option value="40代">40代</option>
                            <option value="50代">50代</option>
                            <option value="60代以上">60代以上</option>
                        </select>
                        <select name="job" required>
                            <option value="">職業</option>
                            <option value="会社員">会社員</option>
                            <option value="主婦">主婦</option>
                            <option value="学生">学生</option>
                            <option value="自営業">自営業</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>満足度（星評価）</label>
                    <select name="stars" required>
                        <option value="5">★★★★★ 5</option>
                        <option value="4">★★★★☆ 4</option>
                        <option value="3">★★★☆☆ 3</option>
                        <option value="2">★★☆☆☆ 2</option>
                        <option value="1">★☆☆☆☆ 1</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>コメント</label>
                    <textarea name="comment" rows="5" required placeholder="施術の感想をご記入ください"></textarea>
                </div>
                <button type="submit" class="btn-submit">投稿する</button>
            </form>
        </div>
    </div>

    <style>
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; }
        .modal-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; font-size: 1.2rem; color: #ff9800; }
        .close { font-size: 28px; font-weight: bold; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #ff9800; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        .btn-submit:hover { background: #e68a00; }
    </style>

    <script>
        // Fetch and display reviews
        async function loadReviews() {
            try {
                const res = await fetch('/api/reviews');
                const reviews = await res.json();
                const container = document.getElementById('reviews-container');
                
                if (reviews.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 20px;">まだ口コミはありません。</p>';
                    return;
                }

                container.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-user-info">
                                <i class="fas fa-user-circle"></i> ${r.nickname}さん <span class="review-user-meta">(${r.profile})</span>
                            </div>
                            <div class="review-date">${r.date}</div>
                        </div>
                        <div class="review-rating-row">
                            <span class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)} ${r.stars}.0</span>
                        </div>
                        <div class="review-content">${r.comment.replace(/\n/g, '<br>')}</div>
                        ${r.reply ? `
                        <div class="review-reply">
                            <div class="reply-title">オーナーからの返信</div>
                            ${r.reply.replace(/\n/g, '<br>')}
                        </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // Modal Logic
        const modal = document.getElementById("reviewModal");
        const btn = document.getElementById("openModal");
        const span = document.getElementsByClassName("close")[0];

        btn.onclick = () => modal.style.display = "block";
        span.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }

        // Form Submission
        document.getElementById('reviewForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = {
                nickname: fd.get('nickname'),
                profile: `${fd.get('gender')}/${fd.get('age')}/${fd.get('job')}`,
                stars: parseInt(fd.get('stars')),
                comment: fd.get('comment')
            };

            try {
                const res = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    modal.style.display = "none";
                    e.target.reset();
                    loadReviews();
                    alert('投稿ありがとうございます！');
                }
            } catch (err) {
                alert('投稿に失敗しました。');
            }
        };

        loadReviews();
    </script>

    <footer class="footer">
        <p>&copy; アポロ整骨院 公式サイト All Rights Reserved.</p>
    </footer>

</body>
</html>
