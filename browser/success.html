<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFTP Connection Successful | アポロ整体院</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #00cec9;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            transform: translateY(0);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        p {
            line-height: 1.6;
            color: #636e72;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: #dff9fb;
            color: var(--accent);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>SFTP Connection Successful</h1>
        <p>VS Codeからの保存即反映（SFTP）の設定が完了しました。接続は正常です。</p>
        <div class="status-badge">Connection Active</div>
        <div class="footer">
            apollo-seikotsuin.jp | Generated by Antigravity
        </div>
    </div>
</body>
</html>
